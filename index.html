<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shard - Уровни</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; min-height: 100vh; }
        h1 { color: #e94560; font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { color: #888; margin-bottom: 30px; }
        .level { background: #16213e; margin: 15px auto; padding: 20px; border-radius: 12px; max-width: 500px; text-align: left; }
        .level strong { font-size: 1.2em; display: block; margin-bottom: 5px; }
        .level .info { color: #888; font-size: 0.9em; margin-bottom: 10px; }
        .level a { background: #e94560; color: white; padding: 10px 20px; border-radius: 6px; text-decoration: none; display: inline-block; font-weight: bold; }
        .level a:hover { background: #ff6b81; }
        .loading { color: #888; font-size: 1.2em; margin-top: 50px; }
        .error { color: #e94560; }
    </style>
</head>
<body>
    <h1>Shard</h1>
    <p class="subtitle">Пользовательские уровни</p>
    <div id="levels"><p class="loading">Загрузка уровней...</p></div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbw7Qq0HOJx2VR1TZtfyOhLJpO3VOxh35p2NVTBVXaeGVtX8fGLWr0GbKNPlrx1ufUCE/exec';

        async function loadLevels() {
            try {
                const response = await fetch(API);
                const levels = await response.json();
                
                if (levels.length === 0) {
                    document.getElementById('levels').innerHTML = '<p>Уровней пока нет. Загляните позже!</p>';
                    return;
                }

                document.getElementById('levels').innerHTML = levels.map(l => {
                    const name = l.name.replace('.zip', '').replace('.7z', '');
                    const sizeMB = (l.size / 1024 / 1024).toFixed(1);
                    return `
                        <div class="level">
                            <strong>${name}</strong>
                            <p class="info">Размер: ${sizeMB} МБ</p>
                            <a href="${l.url}" download>Скачать</a>
                        </div>`;
                }).join('');
            } catch (e) {
                document.getElementById('levels').innerHTML = '<p class="error">Ошибка загрузки уровней. Попробуйте позже.</p>';
            }
        }

        loadLevels();
    </script>
</body>
</html>
